name: Reusable Workflow
on: 
  workflow_call:
    inputs:
      artifact_name:
        description: 'Name of the artifact to download'
        required: true
        default: 'dist'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
      - name: List contents
        run: ls 

      - name: Output information
        run: echo "Deploying & uploading..."
      